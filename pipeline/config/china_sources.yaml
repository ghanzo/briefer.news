  # ── E0. Military signal sources (high-weight) ──────────────────────────────
  # Added 2026-05-14. Editorially central for the Taiwan-frame and Indo-
  # Pacific posture; the China brief had no PLA primary source before this.
  # MND = Ministry of National Defense (国防部) — official press conferences
