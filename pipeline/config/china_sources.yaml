    weight: high                  # anti-corruption signals
    extractor: trafilatura
    retries: 3
    active: true
    notes: "Central Discipline Inspection Commission. Anti-corruption / Party discipline cases. Flaky."

  - name: "NPC News"
    domain: npc.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "http://www.npc.gov.cn/"
    link_pattern: "https?://www\\.npc\\.gov\\.cn/[a-zA-Z0-9_/]+\\.shtml"
    category: legislative
    weight: high                  # NPC laws + Standing Committee readouts
    extractor: trafilatura
    active: true
    notes: "National People's Congress. Mirrors Xinhua leaders too."

  - name: "Qiushi (Party Theoretical Journal)"
    domain: qstheory.cn
    discovery_type: html_curl_cffi
    listing_url: "http://www.qstheory.cn/"
    link_pattern: "https?://(?:www\\.)?qstheory\\.cn/202[5-9]\\d{4}/[a-f0-9]+/c\\.html"
    category: party_theory
    weight: high                  # Xi speeches verbatim
    extractor: detail
    active: true
    notes: "Highest-value ideological signal source. Xi Jinping speech texts when published."

  # ── F. Judicial sources ────────────────────────────────────────────────────
  - name: "Supreme People's Court"
    domain: court.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.court.gov.cn/"
    link_pattern: "https?://www\\.court\\.gov\\.cn/[a-zA-Z0-9_/]+\\.html"
