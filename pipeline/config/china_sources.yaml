  - name: "MND (国防部)"
    domain: mod.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "http://www.mod.gov.cn/gfbw/xwfyr/index.html"
    link_pattern: "/gfbw/[a-z0-9_/]+/16\\d{6}\\.html"
    category: military
    weight: high                  # spokesperson statements, defense policy, Taiwan / PLA-exercise framing
    extractor: trafilatura
    active: true
    notes: "Ministry of National Defense spokesperson page (xwfyr — 新闻发言人). URL pattern: /gfbw/<subsection>/16NNNNNN.html. Probed 2026-05-14: ~80 unique article URLs across subsections."

  - name: "China Military Online (81.cn)"
