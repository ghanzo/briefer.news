    discovery_type: html_curl_cffi
    listing_url: "http://politics.people.com.cn/"
    link_pattern: "http://[a-z]+\\.people\\.com\\.cn/n1/202[5-9]/\\d{4}/c\\d+-\\d+\\.html"
    category: party_press
    weight: high                  # Politburo coverage + editorial signal
    extractor: trafilatura
