# China-government sources (Chinese-language).
#
# All sources scraped via curl_cffi Chrome impersonation (proven against
# Akamai-protected DoD sites; Chinese gov sites have similar TLS/CDN
# behavior). Run by `python main.py --china-only` after the standard scrape.
#
# Editorial weight: INTERNAL CHINA EVOLUTION matters more than external-facing
# diplomatic statements. Sources tagged with `weight: high` are
# internal-policy / domestic-economic / political-signal sources; `weight:
# medium` is external/diplomatic; `weight: low` is procedural/data.
#
# Discovery types:
#   html_curl_cffi      — listing page → extract anchor URLs matching link_pattern
#   mfa_press_conf      — bespoke MFA daily press-conference handling (Q&A structure)
#   xinhua_home         — Xinhua's homepage as aggregated discovery layer
#
# Extraction:
#   trafilatura         — default, works for most pages
#   pages_content       — bespoke <div class="pages_content"> selector
#                         (State Council, NDRC, NBS, others using same CMS)
#   detail              — <div id="detail"> selector (Xinhua articles)
#
# Retries: flaky sources have `retries: 3` (with backoff). Default is 1.

sources:

  # ── A. Voices source — MFA daily press conference ──────────────────────────
  # Single most valuable source. Daily Q&A transcripts with named spokespersons.
  # Each conference yields ~5-7 quotable spokesperson responses.
  - name: "MFA Daily Press Conference"
    domain: mfa.gov.cn
    discovery_type: mfa_press_conf
    listing_url: "https://www.mfa.gov.cn/wjdt_674879/fyrbt_674889/"
    link_pattern: "/202[5-9]\\d{2}/t\\d{8}_\\d+\\.shtml"
    category: diplomacy
    weight: medium                # voices source — external content but high editorial value
    extractor: trafilatura
    active: true
    notes: "Daily on weekdays. Spokespersons: 林剑 Lin Jian, 毛宁 Mao Ning, 郭嘉昆 Guo Jiakun. URL pattern: /YYYYMM/tYYYYMMDD_NNNNNNNN.shtml"

  # ── B. State Council (gov.cn) — definitive policy text ─────────────────────
  - name: "State Council Policies"
    domain: gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.gov.cn/zhengce/"
    link_pattern: "/zhengce/content/202[5-9]\\d{2}/content_\\d{7}\\.htm"
    category: state_council
    weight: high                  # internal admin
    extractor: pages_content      # <div class="pages_content">
    active: true
    notes: "State Council orders signed by Premier. Trafilatura fails — needs pages_content selector."

  - name: "State Council Yaowen (Top News)"
    domain: gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.gov.cn/yaowen/"
    link_pattern: "/yaowen/liebiao/202[5-9]\\d{2}/content_\\d{7}\\.htm"
    category: state_council
    weight: high
    extractor: pages_content
    active: true

  # ── C. Xinhua (新华网) — official wire ──────────────────────────────────────
  - name: "Xinhua News (homepage discovery)"
    domain: news.cn
    discovery_type: xinhua_home
    listing_url: "https://www.news.cn/"
    link_pattern: "https://www\\.news\\.cn/(?:politics|fortune|tech|world)/202[5-9]\\d{4}/[a-f0-9]+/c\\.html"
    category: state_media
    weight: medium                # mix of internal + external
    extractor: detail             # <div id="detail">
    active: true
    notes: "Use homepage as discovery — section indexes are JS-rendered. ~128 URLs per fetch."

  - name: "Xinhua Politics — Leaders"
    domain: news.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.news.cn/politics/leaders/index.htm"
    link_pattern: "https://www\\.news\\.cn/politics/leaders/202[5-9]\\d{4}/[a-f0-9]+/c\\.html"
    category: leadership
    weight: high                  # Xi/Li internal activities
    extractor: detail
    active: true
    notes: "Top-leadership beat — Xi Jinping, Li Qiang activities."

  # ── D. Internal economic regulators (high-weight) ──────────────────────────
  - name: "NDRC News Releases"
    domain: ndrc.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.ndrc.gov.cn/xwdt/xwfb/"
    link_pattern: "/xwdt/xwfb/202[5-9]\\d{2}/t\\d{8}_\\d+\\.html"
    category: economic_planning
    weight: high
    extractor: pages_content
    active: true
    notes: "Economic planning announcements. Several per week."

  - name: "PBOC Press Releases"
    domain: pbc.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "http://www.pbc.gov.cn/"
    link_pattern: "/(?:goutongjiaoliu|hanglingdao)/[\\d/]+/202[5-9]\\d{12}/index\\.html"
    category: monetary
    weight: high
    extractor: trafilatura
    active: true
    notes: "Monetary policy + financial system signals. Continuous output."

  - name: "MOF News"
    domain: mof.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.mof.gov.cn/zhengwuxinxi/caizhengxinwen/"
    link_pattern: "[a-z]+\\.mof\\.gov\\.cn/[a-z]+/202[5-9]\\d{2}/t\\d{8}_\\d+\\.htm"
    category: fiscal
    weight: high
    extractor: trafilatura
    active: true
    notes: "Fiscal policy. Multi-subdomain (jkw, zwgls, jl, etc.)"

  - name: "MIIT News"
    domain: miit.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.miit.gov.cn/xwdt/index.html"
    link_pattern: "/xwdt/[a-z]+/[a-z]+/202[5-9]\\d{2}/t\\d{8}_\\d+\\.html"
    category: industry_tech
    weight: high
    extractor: trafilatura
    retries: 3
    active: true
    notes: "Industrial / tech / chip policy. Flaky — needs retry."

  - name: "CAC Notices"
    domain: cac.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.cac.gov.cn/"
    link_pattern: "/202[5-9]-\\d{2}/\\d{2}/c_\\d+\\.htm"
    category: internet_data
    weight: high
    extractor: trafilatura
    retries: 3
    active: true
    notes: "Internet / AI / algorithm regulation. Flaky — needs retry."

  - name: "Stats Bureau"
    domain: stats.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.stats.gov.cn/sj/zxfb/"
    link_pattern: "/sj/zxfb/202[5-9]\\d{2}/t\\d{8}_\\d+\\.html"
    category: economic_data
    weight: medium                # data-release cadence is irregular
    extractor: pages_content
    active: true

  # ── E. Political signal sources (high-weight) ──────────────────────────────
  - name: "CCDI News"
    domain: ccdi.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.ccdi.gov.cn/yaowenn/"
    link_pattern: "/yaowenn/202[5-9]\\d{2}/t\\d{8}_\\d+\\.html"
