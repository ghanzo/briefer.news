  - name: "Stats Bureau"
    domain: stats.gov.cn
    discovery_type: html_curl_cffi
    listing_url: "https://www.stats.gov.cn/sj/zxfb/"
    link_pattern: "/202[5-9]\\d{2}/t\\d{8}_\\d+\\.html"
    category: economic_data
