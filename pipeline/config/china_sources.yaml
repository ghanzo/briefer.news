    extractor: trafilatura
    active: true
    notes: "China Military Online — PLA-side daily news. Sections: yw (top news), fyr (spokesperson), wj (military affairs), js (tech), ss (sea services), wh (culture). Probed 2026-05-14: 138KB, ~60 article URLs."

