# Akamai-protected and other "hard" gov sources.
# Scraped via curl_cffi TLS impersonation (defeats Akamai bot detection).
# Run by `python main.py --akamai-only` AFTER the standard scrape completes.
#
# Discovery types:
#   dnn_articlecs — DotNetNuke ArticleCS GetList API (returns XML w/ story cards).
#                   All DoD .mil subdomains use this. Need correct moduleID.
#   rss_curl_cffi — Standard RSS/Atom feed, but fetched via curl_cffi (some
#                   gov sites have Cloudflare/Akamai on their RSS too).
#   html_curl_cffi — Plain HTML listing, scrape anchors matching link_pattern.
#
# Each source is independently attempted. Failure of one source does not
# block others — orchestrator logs and moves on.

sources:

  # ── DoD subdomains via DNN ArticleCS API ───────────────────────────────────

  - name: "DOD War.gov News Stories"
    domain: war.gov
    discovery_type: dnn_articlecs
    api_url: "https://www.war.gov/API/ArticleCS/Public/GetList?dpage=0&moduleID=2842"
    category: defense
    tier: 1
    active: true
    notes: "moduleID 2842 derived from storyListing2842_data Vue var on listing page; needs confirmation on first live run"

  - name: "CENTCOM Press Releases"
    domain: centcom.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.centcom.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=1144"
    category: defense
    tier: 1
    active: true
    notes: "moduleID 1144 confirmed via DNN container ID dnn_ctr1144 (user-supplied 2026-05-07). Uses div-item format, not Vue cards."

  - name: "Navy.mil Press Releases"
    domain: navy.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.navy.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=4025"
    category: defense
    tier: 2
    active: true
    notes: "moduleID 4025 confirmed via dnn_ctr4025 (2026-05-07). Listing: /Press-Office/Press-Releases/"

  - name: "Army.mil News"
    domain: army.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.army.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=TBD"
    category: defense
    tier: 2
    active: false
    notes: "Different page architecture — no storyListing or dnn_ctr ArticleCS module found in family probe; needs deeper inspection"

  - name: "Joint Chiefs of Staff"
    domain: jcs.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.jcs.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=8253"
    category: defense
    tier: 1
    active: true
    notes: "moduleID 8253 confirmed via dnn_ctr8253 (2026-05-07). Listing: /Media/News/"

  - name: "U.S. Marines"
    domain: marines.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.marines.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=TBD"
    category: defense
    tier: 3
    active: false
    notes: "Family probe API timed out — different protection profile, deferred"

  - name: "U.S. Air Force"
    domain: af.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.af.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=811"
    category: defense
    tier: 2
    active: true
    notes: "moduleID 811 confirmed via dnn_ctr811 (2026-05-07). Listing: /News/"

  # ── Allied / Coalition government via RSS or HTML ──────────────────────────

  - name: "UK Ministry of Defence"
    domain: gov.uk
    discovery_type: rss_curl_cffi
    rss_url: "https://www.gov.uk/government/organisations/ministry-of-defence.atom"
    category: defense_allied
    tier: 1
    active: true
    notes: "gov.uk standard atom feed; non-Akamai but using curl_cffi for consistency"

  - name: "Australia DFAT — Departmental Media Releases"
    domain: dfat.gov.au
    discovery_type: html_curl_cffi
    listing_url: "https://www.dfat.gov.au/news/departmental-media-releases"
    link_pattern: "/news/media-release/[a-z0-9-]+"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "Australian Dept. of Foreign Affairs & Trade — departmental releases (Indo-Pacific framing, AUKUS, Pacific stepup, Five Eyes sentiment). Non-Akamai but routed via curl_cffi for consistency. Probed 2026-05-14: HTTP 200, 117KB, 163 press-like hrefs."

  - name: "Japan MoFA — Press Releases (EN)"
    domain: mofa.go.jp
    discovery_type: html_curl_cffi
    listing_url: "https://www.mofa.go.jp/press/release/index.html"
    link_pattern: "/press/release/press[a-z0-9]+_\\d+_\\d+\\.html"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "Japan Ministry of Foreign Affairs English press releases. Key allied perspective on Indo-Pacific / Taiwan / North Korea / Russia. URL pattern /press/release/pressXX_NNNNNN_NNNNN.html. Probed 2026-05-14: HTTP 200, 55KB, 154 press-like hrefs."

  # ── UK government additions (Tier C: anglosphere + alliance machinery) ────

  - name: "UK Foreign Office (FCDO)"
    domain: gov.uk
    discovery_type: rss_curl_cffi
    rss_url: "https://www.gov.uk/government/organisations/foreign-commonwealth-development-office.atom"
    category: foreign_policy_allied
    tier: 1
    active: true
    notes: "UK Foreign, Commonwealth & Development Office — the diplomatic counterpart to UK MoD. Standard gov.uk atom feed pattern. Probed 2026-05-26: HTTP 200, fresh items same-day (Russia/Ukraine statements). Non-Akamai but routed via curl_cffi for consistency with UK MoD."

  - name: "UK Prime Minister's Office (No.10)"
    domain: gov.uk
    discovery_type: rss_curl_cffi
    rss_url: "https://www.gov.uk/government/organisations/prime-ministers-office-10-downing-street.atom"
    category: foreign_policy_allied
    tier: 1
    active: true
    notes: "UK PM's office — captures bilateral announcements, summit communiqués, treaty signings (e.g., UK-Poland defence treaty). Standard gov.uk atom feed. Probed 2026-05-26: HTTP 200, fresh same-day items."

  - name: "UK AUKUS keyword tracker"
    domain: gov.uk
    discovery_type: rss_curl_cffi
    rss_url: "https://www.gov.uk/search/news-and-communications.atom?keywords=aukus&order=updated-newest"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "gov.uk search-feed pinned to keyword 'aukus' — captures the UK side of trilateral AUKUS announcements (UK + Aus + US joint statements typically published by all three). Pairs with Aus DFAT + State Dept already in feed. Probed 2026-05-26: returns recent matches."

  # ── Tier B partial: Indo-Pacific (no-RSS direct-scrape sources) ───────────

  - name: "Taiwan MOFA — Press Releases (EN)"
    domain: en.mofa.gov.tw
    discovery_type: html_curl_cffi
    listing_url: "https://en.mofa.gov.tw/News.aspx?n=8&sms=2"
    link_pattern: "News_Content\\.aspx\\?n=\\d+&sms=\\d+&s=\\d+"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "Taiwan Ministry of Foreign Affairs English press releases. Cross-strait flashpoint coverage — Lai administration statements, foreign minister activities, bilateral readouts. URL pattern News_Content.aspx?n=NNNN&sms=NNN&s=NNNNNN. Probed 2026-05-26 via curl_cffi (chrome120 impersonation): HTTP 200, 203KB, 29 News_Content links incl. items dated 2026-05-26 (today). Listing is at /News.aspx?n=8&sms=2 (n=8 is the press-release section)."

  # ── G7 / multilateral feeds ───────────────────────────────────────────────

  - name: "G7 Council Material (Canada presidency feed)"
    domain: international.gc.ca
    discovery_type: rss_curl_cffi
    rss_url: "https://www.international.gc.ca/world-monde/rss/international_relations-relations_internationales/g7/council_material-materiels_conseil_eng.xml"
    category: foreign_policy_allied
    tier: 1
    active: true
    notes: "Atom feed published by Global Affairs Canada's G7 division. Captures G7 ministerial meetings (trade, foreign affairs, finance), joint declarations, and bilateral G7-related events. Currently hosted by Canada due to 2025 presidency. Probed 2026-05-26: HTTP 200, 55KB Atom feed with entries dated through 2026-05-11. Note: feed uses Atom <entry> (not RSS <item>) — verify existing rss_curl_cffi parser handles Atom; if not, falls back to feedparser."

  # ── Office of the Director of National Intelligence ────────────────────────

  - name: "ODNI Press Releases"
    domain: dni.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.dni.gov/index.php/newsroom/press-releases"
    link_pattern: "/index.php/newsroom/press-releases/press-releases-2026/"
    category: intelligence
    tier: 1
    active: true
    notes: "WebFetch got 403 earlier; testing curl_cffi as bypass"

  # ── NATO press releases ────────────────────────────────────────────────────

  - name: "NATO News"
    domain: nato.int
    discovery_type: html_playwright
    listing_url: "https://www.nato.int/en/news-and-events/articles/news"
    link_pattern: "/en/news-and-events/articles/news/\\d{4}/\\d{2}/\\d{2}/[a-z0-9-]+"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "NATO migrated from /cps/en/natohq/ to /en/news-and-events/. The new listing at /articles/news is JS-rendered, so we use html_playwright (renders with Playwright + stealth, then scrapes the post-render DOM). Article URL pattern: /en/news-and-events/articles/news/YYYY/MM/DD/<slug>. Probed live 2026-05-14: Playwright fetch returned 323KB and the regex caught dated articles cleanly."

  # EU EEAS (European External Action Service) — held back 2026-05-14: the
  # /eeas/press-material_en page is a filter index, not an article list;
  # actual press releases route through europa.eu/newsroom which mixes EEAS
  # content with all EU institutions. Site architecture needs investigation
  # before wiring (probably an RSS feed exists somewhere on europa.eu).
  - name: "EU EEAS — Press Material"
    domain: eeas.europa.eu
    discovery_type: html_curl_cffi
    listing_url: "https://www.eeas.europa.eu/eeas/press-material_en"
    link_pattern: "/eeas/[a-z0-9-]+_en"
    category: foreign_policy_allied
    tier: 2
    active: false
    notes: "Held 2026-05-14: page is a press-material filter index, not an article list. Need to find the actual EEAS press-release URL pattern OR switch to europa.eu/newsroom press releases scoped to EEAS."

  # ── HEALTH sources (added 2026-05-27 — Ebola gap) ─────────────────────────
  # Operator flagged that the brief never picked up the recent Ebola
  # airport-screening story. The brief's source pool was heavily diplomatic
  # / security / financial — missing health entirely. These five sources
  # close that gap.

  - name: "CDC Media Releases"
    domain: cdc.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.cdc.gov/media/index.html"
    link_pattern: "/media/releases/\\d{4}/[a-z0-9-]+\\.html"
    category: health
    tier: 1
    active: true
    notes: "CDC press releases (e.g., outbreak alerts, public-health advisories). URL pattern /media/releases/YYYY/<slug>.html. Probed 2026-05-27: contains 'enhanced-ebola-airport-screening-expands-to-atlanta.html' — direct primary source for the Ebola story the brief had been missing."

  - name: "HHS Press Releases"
    domain: hhs.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.hhs.gov/about/news/index.html"
    link_pattern: "/about/news/\\d{4}/\\d{2}/\\d{2}/[a-z0-9-]+\\.html"
    category: health
    tier: 1
    active: true
    notes: "Department of Health and Human Services press releases. URL pattern /about/news/YYYY/MM/DD/<slug>.html. Probed 2026-05-27: 187KB, 10 recent items in last 30 days."

  - name: "FDA Press Announcements"
    domain: fda.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.fda.gov/news-events"
    link_pattern: "/news-events/press-announcements/[a-z0-9-]+"
    category: health
    tier: 1
    active: true
    notes: "FDA press announcements — drug approvals, enforcement actions, retailer warnings, recalls. Probed 2026-05-27 via /news-events: clear /news-events/press-announcements/<slug> pattern (e.g., fda-approves-first-treatment-chronic-hepatitis-delta-virus)."

  - name: "FDA Recalls & Safety Alerts"
    domain: fda.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.fda.gov/safety/recalls-market-withdrawals-safety-alerts"
    link_pattern: "/safety/recalls-market-withdrawals-safety-alerts/[a-z0-9-]+"
    category: health
    tier: 2
    active: true
    notes: "FDA recalls + market withdrawals + safety alerts. Distinct from press announcements — listing 73KB with 11 dated entries. Pattern /safety/recalls-market-withdrawals-safety-alerts/<slug>."

  - name: "NIH News Releases"
    domain: nih.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.nih.gov/news-events/news-releases"
    link_pattern: "/news-events/news-releases/[a-z0-9-]+"
    category: health
    tier: 1
    active: true
    notes: "National Institutes of Health press releases — research findings, grants, policy. Pattern /news-events/news-releases/<slug>. Probed 2026-05-27: 68KB with 7 recent items, 27 article links."

  # ── TECHNOLOGY + SCIENCE sources (added 2026-05-27) ───────────────────────

  - name: "NIST News"
    domain: nist.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.nist.gov/news-events/news"
    link_pattern: "/news-events/news/\\d{4}/\\d{2}/[a-z0-9-]+"
    category: technology
    tier: 1
    active: true
    notes: "National Institute of Standards and Technology news — measurement science, AI/quantum standards, cybersecurity guidelines (the basis for federal CISA + DoD CNSA practice). 127KB at listing, 6 recent dated items."

  - name: "NSF News"
    domain: nsf.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.nsf.gov/news/"
    link_pattern: "/news/[a-z0-9-]+"
    category: technology
    tier: 2
    active: true
    notes: "National Science Foundation news — research funding announcements, scientific results. 75KB at listing, 13 recent dated items, 14 article links."

  - name: "FCC News"
    domain: fcc.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.fcc.gov/news-events/headlines"
    link_pattern: "/news-events/headlines/\\d+"
    category: technology
    tier: 2
    active: true
    notes: "Federal Communications Commission headlines — telecom rulings, spectrum policy, broadband. Pattern /news-events/headlines/<numeric-id>. 168KB at listing, 29 recent items, 37 article links."

  - name: "DOE Newsroom Articles"
    domain: energy.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.energy.gov/newsroom"
    link_pattern: "/articles/[a-z0-9-]+"
    category: energy
    tier: 1
    active: true
    notes: "Department of Energy articles — grid policy, secretary statements, fact sheets. /newsroom is the official news landing. Pattern /articles/<slug>. 142KB at listing with fresh secretary remarks + fact sheets."
