# Akamai-protected and other "hard" gov sources.
# Scraped via curl_cffi TLS impersonation (defeats Akamai bot detection).
# Run by `python main.py --akamai-only` AFTER the standard scrape completes.
#
# Discovery types:
#   dnn_articlecs — DotNetNuke ArticleCS GetList API (returns XML w/ story cards).
#                   All DoD .mil subdomains use this. Need correct moduleID.
#   rss_curl_cffi — Standard RSS/Atom feed, but fetched via curl_cffi (some
#                   gov sites have Cloudflare/Akamai on their RSS too).
#   html_curl_cffi — Plain HTML listing, scrape anchors matching link_pattern.
#
# Each source is independently attempted. Failure of one source does not
# block others — orchestrator logs and moves on.

sources:

  # ── DoD subdomains via DNN ArticleCS API ───────────────────────────────────

  - name: "DOD War.gov News Stories"
    domain: war.gov
    discovery_type: dnn_articlecs
    api_url: "https://www.war.gov/API/ArticleCS/Public/GetList?dpage=0&moduleID=2842"
    category: defense
    tier: 1
    active: true
    notes: "moduleID 2842 derived from storyListing2842_data Vue var on listing page; needs confirmation on first live run"

  - name: "CENTCOM Press Releases"
    domain: centcom.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.centcom.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=1144"
    category: defense
    tier: 1
    active: true
    notes: "moduleID 1144 confirmed via DNN container ID dnn_ctr1144 (user-supplied 2026-05-07). Uses div-item format, not Vue cards."

  - name: "Navy.mil Press Releases"
    domain: navy.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.navy.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=4025"
    category: defense
    tier: 2
    active: true
    notes: "moduleID 4025 confirmed via dnn_ctr4025 (2026-05-07). Listing: /Press-Office/Press-Releases/"

  - name: "Army.mil News"
    domain: army.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.army.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=TBD"
    category: defense
    tier: 2
    active: false
    notes: "Different page architecture — no storyListing or dnn_ctr ArticleCS module found in family probe; needs deeper inspection"

  - name: "Joint Chiefs of Staff"
    domain: jcs.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.jcs.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=8253"
    category: defense
    tier: 1
    active: true
    notes: "moduleID 8253 confirmed via dnn_ctr8253 (2026-05-07). Listing: /Media/News/"

  - name: "U.S. Marines"
    domain: marines.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.marines.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=TBD"
    category: defense
    tier: 3
    active: false
    notes: "Family probe API timed out — different protection profile, deferred"

  - name: "U.S. Air Force"
    domain: af.mil
    discovery_type: dnn_articlecs
    api_url: "https://www.af.mil/API/ArticleCS/Public/GetList?dpage=0&moduleID=811"
    category: defense
    tier: 2
    active: true
    notes: "moduleID 811 confirmed via dnn_ctr811 (2026-05-07). Listing: /News/"

  # ── Allied / Coalition government via RSS or HTML ──────────────────────────

  - name: "UK Ministry of Defence"
    domain: gov.uk
    discovery_type: rss_curl_cffi
    rss_url: "https://www.gov.uk/government/organisations/ministry-of-defence.atom"
    category: defense_allied
    tier: 1
    active: true
    notes: "gov.uk standard atom feed; non-Akamai but using curl_cffi for consistency"

  - name: "Australia DFAT — Departmental Media Releases"
    domain: dfat.gov.au
    discovery_type: html_curl_cffi
    listing_url: "https://www.dfat.gov.au/news/departmental-media-releases"
    link_pattern: "/news/media-release/[a-z0-9-]+"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "Australian Dept. of Foreign Affairs & Trade — departmental releases (Indo-Pacific framing, AUKUS, Pacific stepup, Five Eyes sentiment). Non-Akamai but routed via curl_cffi for consistency. Probed 2026-05-14: HTTP 200, 117KB, 163 press-like hrefs."

  - name: "Japan MoFA — Press Releases (EN)"
    domain: mofa.go.jp
    discovery_type: html_curl_cffi
    listing_url: "https://www.mofa.go.jp/press/release/index.html"
    link_pattern: "/press/release/press[a-z0-9]+_\\d+_\\d+\\.html"
    category: foreign_policy_allied
    tier: 2
    active: true
    notes: "Japan Ministry of Foreign Affairs English press releases. Key allied perspective on Indo-Pacific / Taiwan / North Korea / Russia. URL pattern /press/release/pressXX_NNNNNN_NNNNN.html. Probed 2026-05-14: HTTP 200, 55KB, 154 press-like hrefs."

  # ── Office of the Director of National Intelligence ────────────────────────

  - name: "ODNI Press Releases"
    domain: dni.gov
    discovery_type: html_curl_cffi
    listing_url: "https://www.dni.gov/index.php/newsroom/press-releases"
    link_pattern: "/index.php/newsroom/press-releases/press-releases-2026/"
    category: intelligence
    tier: 1
    active: true
    notes: "WebFetch got 403 earlier; testing curl_cffi as bypass"

  # ── NATO press releases ────────────────────────────────────────────────────

  - name: "NATO Press Releases"
    domain: nato.int
    discovery_type: html_curl_cffi
    listing_url: "https://www.nato.int/en/news-and-events/press-office"
    link_pattern: "/en/news-and-events/articles/[a-z0-9-]+"
    category: foreign_policy_allied
    tier: 2
    active: false
    notes: "Re-probed 2026-05-14: NATO has migrated from /cps/en/natohq/news.htm to /en/news-and-events/. The new listing page is JS-rendered (curl_cffi gets the chrome HTML but article URLs aren't in the initial HTML; needs Playwright). Listing URL updated; held disabled until a Playwright variant of this discovery type is wired. NATO communiqués and press releases will then surface on the US side."

  # EU EEAS (European External Action Service) — held back 2026-05-14: the
  # /eeas/press-material_en page is a filter index, not an article list;
  # actual press releases route through europa.eu/newsroom which mixes EEAS
  # content with all EU institutions. Site architecture needs investigation
  # before wiring (probably an RSS feed exists somewhere on europa.eu).
  - name: "EU EEAS — Press Material"
    domain: eeas.europa.eu
    discovery_type: html_curl_cffi
    listing_url: "https://www.eeas.europa.eu/eeas/press-material_en"
    link_pattern: "/eeas/[a-z0-9-]+_en"
    category: foreign_policy_allied
    tier: 2
    active: false
    notes: "Held 2026-05-14: page is a press-material filter index, not an article list. Need to find the actual EEAS press-release URL pattern OR switch to europa.eu/newsroom press releases scoped to EEAS."
