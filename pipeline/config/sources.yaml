# ─────────────────────────────────────────────────────────────────────────────
# Briefer — News Sources
#
# Fields:
#   name     : display name (must be unique)
#   type     : rss | google_news
#   url      : RSS feed URL
#   category : geopolitics | technology | energy | materials | ecosystem |
#              climate | social | health | science | finance
#   tier     : 1=official gov/primary, 2=major outlets/google news, 3=analysis
#   active   : true/false — set false to disable without deleting
#
# Scraping note — state.gov and most US gov sites are JS-rendered:
#   Pull content from RSS content:encoded field directly.
#   Do NOT fetch article URLs — they return boilerplate JavaScript fallback text.
#
# See COVERAGE.md for full thematic scope and scraping strategy.
# ─────────────────────────────────────────────────────────────────────────────

