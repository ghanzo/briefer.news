# ─────────────────────────────────────────────────────────────────────────────
# Briefer — News Sources (lean world-brief edition)
#
# 39 active US-gov sources (focus narrowed 2026-05-06 to US fed only).
# 14 international/non-US sources moved to held: BBC, AJ, DW, Yonhap, AllAfrica,
# UK Gov, Kremlin RU, TASS RU, UN, WHO, IAEA, OilPrice, Mining.com, Hacker News.
# Will reactivate after Stage 2/3 validation. See CLAUDE.md for build progression.
# Probe history: 2026-05-02 (25 baseline), 2026-05-05 (+14 US-gov + 5 HTML-scrape),
# 2026-05-06 (+9 State Dept: 6 regional desks reactivated + 3 new feeds).
# Per-source operational notes: SOURCE_NOTES.md
# Probe scripts: research/probe_sources.py, probe_candidates.py, test_html_scrape.py
#
# Fields:
#   name     : display name (must be unique)
#   type     : rss | rss_translate | google_news | web_scrape | playwright
#   url      : feed or page URL
#   category : geopolitics | technology | energy | economy | security | health | science
#   tier     : 1=official gov/primary, 2=major outlets, 3=analysis
#   extractor: trafilatura (default) | playwright
#   active   : omit (defaults true) | active: false
# ─────────────────────────────────────────────────────────────────────────────

