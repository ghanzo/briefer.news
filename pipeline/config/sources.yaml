#   category : geopolitics | technology | finance | science | health
#   tier     : 1=official gov, 2=major outlets/google news, 3=analysis
#   active   : true/false — set false to disable without deleting
#
# To add a new source: add an entry here and restart the pipeline. No code changes needed.
# ─────────────────────────────────────────────────────────────────────────────

