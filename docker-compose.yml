services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: briefer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-briefer}
      POSTGRES_USER: ${POSTGRES_USER:-briefer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pipeline/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-briefer} -d ${POSTGRES_DB:-briefer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Admin UI ───────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: briefer_adminer
    restart: unless-stopped
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Pipeline (scraper + processor + site builder) ────────────────────────────
  # NOTE: this service is NOT meant to run as a long-lived daemon. It exists
  # so daily.sh can invoke `docker compose run --rm pipeline python main.py …`
  # for one-off scrape jobs. The image's default CMD `python main.py` would
  # otherwise start an in-container APScheduler that conflicts with the
  # LaunchAgent at ~/Library/LaunchAgents/news.briefer.daily.plist.
  # Therefore: no `restart` policy, and `nginx` no longer `depends_on` it.
  pipeline:
    build: ./pipeline
    container_name: briefer_pipeline
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-briefer}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-briefer}
    volumes:
      - ./pipeline:/app
      - ./lens.md:/app/lens.md:ro
      - site_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - manual

  # ── Web server ────────────────────────────────────────────────────────────────
  # nginx serves the static brief HTML from the site_output volume. The volume
  # holds content even when pipeline is not running, so no depends_on here.
  nginx:
    image: nginx:alpine
    container_name: briefer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - site_output:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # ── Cloudflare Tunnel for api.briefer.news ───────────────────────────────────
  # Outbound-only TLS tunnel to Cloudflare's edge. Exposes the LaunchAgent
  # email_api_server.py (running on host port 8765) at api.briefer.news with
  # zero inbound firewall holes. Mirrors the cabin_tunnel pattern from the
  # Cabin-Server stack. Ingress config + DNS managed via the Cloudflare API
  # (config_src=cloudflare on the tunnel) — no local YAML config file needed.
  # Token in .env (BRIEFER_TUNNEL_TOKEN); regenerable via the CF Tunnel API.
  briefer_tunnel:
    image: cloudflare/cloudflared:latest
    container_name: briefer_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${BRIEFER_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  site_output:
