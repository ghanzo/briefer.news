services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: briefer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-briefer}
      POSTGRES_USER: ${POSTGRES_USER:-briefer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pipeline/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-briefer} -d ${POSTGRES_DB:-briefer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Admin UI ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: briefer_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@briefer.news}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Pipeline (scraper + processor + site builder) ────────────────────────────
  pipeline:
    build: ./pipeline
    container_name: briefer_pipeline
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-briefer}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-briefer}
    volumes:
      - ./pipeline:/app
      - ./lens.md:/app/lens.md:ro
      - site_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy

  # ── Web server ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: briefer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - site_output:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pipeline

volumes:
  postgres_data:
  pgadmin_data:
  site_output:
